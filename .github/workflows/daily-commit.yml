name: Daily Commit JP - 13:00 Aysén

on:
  schedule:
    - cron: "0 16 * * *"      # ← Corre a las 13:00 hora local de Aysén (UTC-3)
  workflow_dispatch:          # Para probarlo manualmente cuando quieras

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update file
        run: |
          echo "Último commit automático: $(date '+%Y-%m-%d %H:%M:%S') - Juan Pablo trabajando en Aysén" > last-update.txt

      - name: Commit and push
        run: |
          git config user.name "Juan Pablo Marileo"
          git config user.email "jpmarileo@gmail.com"   # ← CAMBIA ESTO SÍ O SÍ
          git add last-update.txt
          git commit -m "Daily auto commit - Racha mantenida 🔥 $(date '+%Y-%m-%d %H:%M') - Aysén" || echo "No hay cambios nuevos"
          git push