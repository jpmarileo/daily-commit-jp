name: Daily Commit JP - 13:00 Aysén

on:
  schedule:
    - cron: "0 16 * * *"   # 13:00 hora Aysén (UTC-3)
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update file
        run: |
          echo "Commit automático $(date '+%Y-%m-%d %H:%M:%S') - Juan Pablo en Aysén" > last-update.txt

      - name: Commit and push
        run: |
          git config user.name "Juan Pablo Marileo"
          git config user.email "jpmarileo@gmail.com"   # ← CAMBIA ESTO por tu correo verificado
          git add last-update.txt
          git commit -m "Daily auto commit - Racha mantenida 🔥 $(date '+%Y-%m-%d')" || echo "Sin cambios"
          git push