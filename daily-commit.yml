name: Daily Commit

on:
  schedule:
    - cron: "0 12 * * *"  # A las 12:00 UTC (ajusta a tu hora Chile, ejemplo 8 AM Chile ≈ 12 UTC)
  workflow_dispatch:  # Para ejecutarlo manualmente si quieres

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update file
        run: |
          echo "Último commit automático: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > last-update.txt

      - name: Commit and push
        run: |
          git config user.name "Juan Pablo Marileo"
          git config user.email "tu-email-registrado-en-github@example.com"
          git add last-update.txt
          git commit -m "Daily auto commit - Racha mantenida 🔥" || echo "No hay cambios"
          git push
